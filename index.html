<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>灵活房间测量原型 · Flexible Room Prototype</title>
<style>
  :root {
    --border: #d7dbe0;
    --primary: #2b6ef2;
    --primary-dark: #1d54c4;
    --danger: #c0392b;
    --bg: #f6f7f9;
    --card-bg: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: #1c1f24;
  }

  header {
    padding: 14px 16px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    margin: 0 0 2px;
    font-size: 17px;
  }

  header p {
    margin: 0;
    font-size: 12px;
    color: #666;
  }

  main {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px;
    max-width: 1200px;
    margin: 0 auto;
  }

  @media (min-width: 900px) {
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      align-items: start;
    }
  }

  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }

  .panel h2 {
    margin: 0 0 8px;
    font-size: 14px;
    color: #444;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  select, input[type="text"] {
    min-height: 40px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
  }

  button {
    min-height: 40px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: #f1f2f4;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  button:active { background: #e4e6e9; }

  button.primary {
    background: var(--primary);
    border-color: var(--primary-dark);
    color: white;
  }

  button.danger {
    background: #fdecec;
    border-color: #e5b3b3;
    color: var(--danger);
  }

  button.tag {
    background: white;
  }

  button.tag.active {
    background: #eef4ff;
    border-color: var(--primary);
    box-shadow: inset 0 0 0 1px var(--primary);
    color: var(--primary-dark);
  }

  button.tag input[type="checkbox"] {
    margin-right: 6px;
  }

  #canvasWrap {
    position: relative;
    width: 100%;
    height: 560px;
    background: repeating-conic-gradient(#eef0f2 0% 25%, #f8f9fa 0% 50%) 0 0/24px 24px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    touch-action: none;
    cursor: crosshair;
  }

  #canvasWrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  .pt {
    position: absolute;
    transform: translate(-50%, -50%);
    min-width: 34px;
    padding: 3px 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.92);
    border: 1.5px solid currentColor;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }

  .hint {
    font-size: 12px;
    color: #777;
    line-height: 1.5;
    margin: 4px 0 10px;
  }

  .emptyState {
    padding: 14px;
    text-align: center;
    color: #888;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th, td {
    text-align: left;
    padding: 5px 6px;
    border-bottom: 1px solid var(--border);
  }

  th { color: #666; font-weight: 600; }

  fieldset {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 0 0 10px;
    padding: 8px 10px;
  }

  legend { font-size: 12px; font-weight: 700; color: #444; padding: 0 4px; }

  .radioRow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

  .radioChoice {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 6px 9px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    background: white;
  }

  .radioChoice:has(input:checked) {
    border-color: var(--primary);
    background: #eef4ff;
  }

  small.note { color: #888; }
</style>
</head>
<body>

<header>
  <h1>灵活房间测量 · 原型测试</h1>
  <p>房间/单元 + 自定义面命名 + Position / Angle 排序 — 独立测试版，跟正式 App 数据完全无关</p>
</header>

<main>
  <section class="panel">
    <h2>1. 房间 / 单元</h2>
    <div class="row">
      <select id="roomSelect"></select>
      <button id="addRoomBtn">+ 新房间</button>
      <button id="renameRoomBtn">改名</button>
      <button id="deleteRoomBtn" class="danger">删除房间</button>
    </div>

    <h2>2. 面（顺时针命名，会记住上次选的）</h2>
    <div id="sideTagsRow" class="row"></div>
    <p class="hint">点已有的"面"标签直接切换；点"+ 新的面"输入名字（比如 面1、面2）。之后点图会自动用当前选中的这一面，直到你换一个。</p>

    <h2>3. 点图加点</h2>
    <div class="row">
      <input type="file" id="bgImageInput" accept="image/*">
      <button id="clearBgBtn">移除底图</button>
    </div>
    <div id="canvasWrap"><div id="pointsLayer"></div></div>
    <p class="hint">在上面区域点一下 = 加一个点（会跳出小框让你输入测量值）；点已有的点 = 编辑/删除。</p>
  </section>

  <section class="panel" id="sidePanel">
    <h2>Auto Sort（针对当前房间）</h2>

    <fieldset>
      <legend>排序方式</legend>
      <div class="radioRow">
        <label class="radioChoice"><input type="radio" name="method" value="position" checked><span>按坐标（直墙）</span></label>
        <label class="radioChoice"><input type="radio" name="method" value="angle"><span>按角度（弧形/圆形）</span></label>
      </div>
    </fieldset>

    <fieldset id="positionDirectionField">
      <legend>坐标排序方向</legend>
      <div class="radioRow">
        <label class="radioChoice"><input type="radio" name="posDir" value="lr" checked><span>从左到右</span></label>
        <label class="radioChoice"><input type="radio" name="posDir" value="rl"><span>从右到左</span></label>
        <label class="radioChoice"><input type="radio" name="posDir" value="tb"><span>从上到下</span></label>
        <label class="radioChoice"><input type="radio" name="posDir" value="bt"><span>从下到上</span></label>
      </div>
    </fieldset>

    <fieldset id="angleDirectionField" style="display:none;">
      <legend>角度排序方向</legend>
      <div class="radioRow">
        <label class="radioChoice"><input type="radio" name="angleDir" value="cw" checked><span>↻ 顺时针</span></label>
        <label class="radioChoice"><input type="radio" name="angleDir" value="ccw"><span>↺ 逆时针</span></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>应用到哪些面（可多选）</legend>
      <div id="sortTargetRow" class="radioRow"></div>
    </fieldset>

    <button class="primary" id="runSortBtn" style="width:100%;">排序</button>
    <p class="hint" id="sortStatus"></p>

    <h2 style="margin-top:16px;">点列表</h2>
    <div id="pointsTableWrap"></div>
  </section>
</main>

<script>
"use strict";

const STORAGE_KEY = "flexible_room_prototype_v1";
const ROOM_COLORS = ["#0066ff", "#ff0000", "#00aa00", "#8000ff", "#e07b00", "#00969c", "#c2185b", "#5d4037"];

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore corrupt storage */ }

  const firstRoomId = "room_" + Date.now();
  return {
    rooms: [{ id: firstRoomId, name: "901", color: ROOM_COLORS[0] }],
    points: [],
    sidesByRoom: { [firstRoomId]: [] },
    currentSideByRoom: {},
    currentRoomId: firstRoomId,
    backgroundImage: null
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function uid(prefix) {
  return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
}

function currentRoom() {
  return state.rooms.find(r => r.id === state.currentRoomId) || state.rooms[0];
}

function currentSides() {
  return state.sidesByRoom[state.currentRoomId] || [];
}

function currentSide() {
  return state.currentSideByRoom[state.currentRoomId] || "";
}

function pointsInSide(roomId, side) {
  return state.points.filter(p => p.roomId === roomId && p.side === side);
}

/* Rank of each point within its (room, side) group, based on stored `order`. */
function seqOf(point) {
  const siblings = pointsInSide(point.roomId, point.side).slice().sort((a, b) => a.order - b.order);
  return siblings.findIndex(p => p.id === point.id) + 1;
}

/* ---------- Rendering ---------- */

function renderAll() {
  renderRoomSelect();
  renderSideTags();
  renderPoints();
  renderSortTargets();
  renderPointsTable();
  saveState();
}

function renderRoomSelect() {
  const select = document.getElementById("roomSelect");
  select.innerHTML = "";
  state.rooms.forEach(room => {
    const opt = document.createElement("option");
    opt.value = room.id;
    opt.textContent = room.name;
    select.appendChild(opt);
  });
  select.value = state.currentRoomId;
}

function renderSideTags() {
  const row = document.getElementById("sideTagsRow");
  row.innerHTML = "";

  const sides = currentSides();
  const active = currentSide();

  if (!sides.length) {
    const empty = document.createElement("span");
    empty.className = "hint";
    empty.textContent = "这个房间还没有面，先加一个：";
    row.appendChild(empty);
  }

  sides.forEach(side => {
    const btn = document.createElement("button");
    btn.className = "tag" + (side === active ? " active" : "");
    btn.textContent = side;
    btn.addEventListener("click", () => {
      state.currentSideByRoom[state.currentRoomId] = side;
      renderAll();
    });
    row.appendChild(btn);
  });

  const addBtn = document.createElement("button");
  addBtn.className = "primary";
  addBtn.textContent = "+ 新的面";
  addBtn.addEventListener("click", () => {
    const name = prompt("这个面叫什么名字？（比如 面1、面2）");
    if (!name || !name.trim()) return;
    const trimmed = name.trim();
    if (!state.sidesByRoom[state.currentRoomId]) state.sidesByRoom[state.currentRoomId] = [];
    if (!state.sidesByRoom[state.currentRoomId].includes(trimmed)) {
      state.sidesByRoom[state.currentRoomId].push(trimmed);
    }
    state.currentSideByRoom[state.currentRoomId] = trimmed;
    renderAll();
  });
  row.appendChild(addBtn);
}

function renderPoints() {
  const layer = document.getElementById("pointsLayer");
  layer.innerHTML = "";

  const room = currentRoom();
  state.points.filter(p => p.roomId === room.id).forEach(point => {
    const el = document.createElement("div");
    el.className = "pt";
    el.style.left = point.x + "px";
    el.style.top = point.y + "px";
    el.style.color = room.color;
    el.textContent = `${room.name}-${point.side}-${seqOf(point)}`;
    el.addEventListener("click", event => {
      event.stopPropagation();
      editPoint(point);
    });
    layer.appendChild(el);
  });
}

function renderSortTargets() {
  const row = document.getElementById("sortTargetRow");
  row.innerHTML = "";
  const sides = currentSides();

  if (!sides.length) {
    row.innerHTML = '<span class="hint">这个房间还没有面。</span>';
    return;
  }

  sides.forEach(side => {
    const label = document.createElement("label");
    label.className = "radioChoice";
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.value = side;
    checkbox.checked = side === currentSide();
    const span = document.createElement("span");
    span.textContent = side;
    label.appendChild(checkbox);
    label.appendChild(span);
    row.appendChild(label);
  });
}

function renderPointsTable() {
  const wrap = document.getElementById("pointsTableWrap");
  const room = currentRoom();
  const roomPoints = state.points
    .filter(p => p.roomId === room.id)
    .slice()
    .sort((a, b) => (a.side + "").localeCompare(b.side + "") || a.order - b.order);

  if (!roomPoints.length) {
    wrap.innerHTML = '<div class="emptyState">这个房间还没有点</div>';
    return;
  }

  let html = "<table><thead><tr><th>Label</th><th>面</th><th>值</th><th></th></tr></thead><tbody>";
  roomPoints.forEach(point => {
    html += `<tr>
      <td>${room.name}-${point.side}-${seqOf(point)}</td>
      <td>${escapeHtml(point.side)}</td>
      <td>${escapeHtml(point.value || "")}</td>
      <td><button data-del="${point.id}" class="danger" style="min-height:30px;padding:2px 8px;">删除</button></td>
    </tr>`;
  });
  html += "</tbody></table>";
  wrap.innerHTML = html;

  wrap.querySelectorAll("[data-del]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.points = state.points.filter(p => p.id !== btn.dataset.del);
      renderAll();
    });
  });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

/* ---------- Point add / edit ---------- */

function addPointAt(x, y) {
  const side = currentSide();
  if (!side) {
    alert("先选一个面（或者新建一个面），再点图加点。");
    return;
  }

  const value = prompt("测量值（随便填，测试用）：", "");
  if (value === null) return; // cancelled

  const roomId = state.currentRoomId;
  const siblings = pointsInSide(roomId, side);
  const maxOrder = siblings.length ? Math.max(...siblings.map(p => p.order)) : 0;

  state.points.push({
    id: uid("pt"),
    roomId,
    side,
    order: maxOrder + 1,
    x, y,
    value: value.trim()
  });

  renderAll();
}

function editPoint(point) {
  const action = prompt(
    `编辑这个点的值（当前：${point.value || "空"}）。留空取消，输入 "del" 删除这个点：`,
    point.value || ""
  );
  if (action === null) return;
  if (action.trim().toLowerCase() === "del") {
    state.points = state.points.filter(p => p.id !== point.id);
  } else if (action.trim()) {
    point.value = action.trim();
  }
  renderAll();
}

/* ---------- Auto sort: position ---------- */

function sortSideByPosition(roomId, side, dir) {
  const pts = pointsInSide(roomId, side).slice();
  if (dir === "lr") pts.sort((a, b) => a.x - b.x);
  else if (dir === "rl") pts.sort((a, b) => b.x - a.x);
  else if (dir === "tb") pts.sort((a, b) => a.y - b.y);
  else pts.sort((a, b) => b.y - a.y); // bt
  pts.forEach((p, i) => { p.order = i + 1; });
}

/* ---------- Auto sort: angle (verified against the main app's algorithm) ---------- */

function sortSideByAngle(roomId, side, clockwise) {
  const pts = pointsInSide(roomId, side).slice();
  if (pts.length <= 1) return;

  const cx = pts.reduce((sum, p) => sum + p.x, 0) / pts.length;
  const cy = pts.reduce((sum, p) => sum + p.y, 0) / pts.length;

  const withAngles = pts.map(point => {
    let angle = Math.atan2(point.y - cy, point.x - cx);
    if (angle < 0) angle += 2 * Math.PI;
    return { point, angle };
  });

  withAngles.sort((a, b) => a.angle - b.angle);

  let maxGap = -1;
  let seamIndex = 0;
  for (let i = 0; i < withAngles.length; i += 1) {
    const current = withAngles[i].angle;
    const isLast = i === withAngles.length - 1;
    const next = withAngles[isLast ? 0 : i + 1].angle + (isLast ? 2 * Math.PI : 0);
    const gap = next - current;
    if (gap > maxGap) {
      maxGap = gap;
      seamIndex = isLast ? 0 : i + 1;
    }
  }

  const rotated = withAngles.slice(seamIndex).concat(withAngles.slice(0, seamIndex));
  const ordered = clockwise ? rotated : rotated.slice().reverse();
  ordered.forEach((item, i) => { item.point.order = i + 1; });
}

function runSort() {
  const method = document.querySelector('input[name="method"]:checked').value;
  const targets = Array.from(document.querySelectorAll('#sortTargetRow input:checked')).map(cb => cb.value);
  const status = document.getElementById("sortStatus");

  if (!targets.length) {
    status.textContent = "先勾选至少一个面。";
    return;
  }

  const roomId = state.currentRoomId;

  if (method === "position") {
    const dir = document.querySelector('input[name="posDir"]:checked').value;
    targets.forEach(side => sortSideByPosition(roomId, side, dir));
    status.textContent = `已按坐标排序：${targets.join("、")}`;
  } else {
    const clockwise = document.querySelector('input[name="angleDir"]:checked').value === "cw";
    targets.forEach(side => sortSideByAngle(roomId, side, clockwise));
    status.textContent = `已按角度排序：${targets.join("、")}`;
  }

  renderAll();
}

/* ---------- Wiring ---------- */

document.getElementById("roomSelect").addEventListener("change", event => {
  state.currentRoomId = event.target.value;
  renderAll();
});

document.getElementById("addRoomBtn").addEventListener("click", () => {
  const name = prompt("新房间/单元号：", "");
  if (!name || !name.trim()) return;
  const id = uid("room");
  const color = ROOM_COLORS[state.rooms.length % ROOM_COLORS.length];
  state.rooms.push({ id, name: name.trim(), color });
  state.sidesByRoom[id] = [];
  state.currentRoomId = id;
  renderAll();
});

document.getElementById("renameRoomBtn").addEventListener("click", () => {
  const room = currentRoom();
  const name = prompt("新名字：", room.name);
  if (!name || !name.trim()) return;
  room.name = name.trim();
  renderAll();
});

document.getElementById("deleteRoomBtn").addEventListener("click", () => {
  if (state.rooms.length <= 1) {
    alert("至少要留一个房间。");
    return;
  }
  const room = currentRoom();
  const count = state.points.filter(p => p.roomId === room.id).length;
  if (!confirm(`删除房间"${room.name}"？${count ? `会同时删除里面的 ${count} 个点。` : ""}`)) return;

  state.points = state.points.filter(p => p.roomId !== room.id);
  delete state.sidesByRoom[room.id];
  delete state.currentSideByRoom[room.id];
  state.rooms = state.rooms.filter(r => r.id !== room.id);
  state.currentRoomId = state.rooms[0].id;
  renderAll();
});

document.getElementById("canvasWrap").addEventListener("click", event => {
  const rect = event.currentTarget.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  addPointAt(Math.round(x), Math.round(y));
});

document.getElementById("bgImageInput").addEventListener("change", event => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state.backgroundImage = reader.result;
    renderBackground();
    saveState();
  };
  reader.readAsDataURL(file);
});

document.getElementById("clearBgBtn").addEventListener("click", () => {
  state.backgroundImage = null;
  renderBackground();
  saveState();
});

function renderBackground() {
  const wrap = document.getElementById("canvasWrap");
  let img = wrap.querySelector("img");
  if (state.backgroundImage) {
    if (!img) {
      img = document.createElement("img");
      wrap.insertBefore(img, wrap.firstChild);
    }
    img.src = state.backgroundImage;
  } else if (img) {
    img.remove();
  }
}

document.querySelectorAll('input[name="method"]').forEach(radio => {
  radio.addEventListener("change", () => {
    const isAngle = document.querySelector('input[name="method"]:checked').value === "angle";
    document.getElementById("positionDirectionField").style.display = isAngle ? "none" : "";
    document.getElementById("angleDirectionField").style.display = isAngle ? "" : "none";
  });
});

document.getElementById("runSortBtn").addEventListener("click", runSort);

/* ---------- Init ---------- */

renderBackground();
renderAll();
</script>
</body>
</html>
